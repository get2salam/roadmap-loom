  <text x="396" y="206" font-family="Inter, Arial, sans-serif" font-size="17" fill="#eef2ff">Quarter roadmap loom</text>
  <text x="396" y="232" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">A narrative-first roadmap board for focused teams and solo builders.</text>
  <rect x="396" y="246" width="168" height="8" rx="4" fill="url(#accent)" opacity="0.9" />
  <rect x="370" y="280" width="528" height="196" rx="24" fill="#0b1020" stroke="#41256d" />

<rect x="88" y="228" width="228" height="58" rx="18" fill="#111827" stroke="#41256d" />
